# =============================================================================
# OpenTelemetry Collector — AWCP configuration
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    send_batch_size: 512
    timeout: 5s

  resource:
    attributes:
      - action: upsert
        key: deployment.environment
        value: development

exporters:
  # Traces → Tempo (via OTLP gRPC)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs → Loki (via HTTP)
  # NOTE: The 'labels' key was removed — the lokiexporter v0.102+ uses
  # 'attributes' directly; label mapping is now done inside 'hints' on the
  # resource attributes using the otlp_json format.
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:
      exporter: false
      job: true

  # Metrics → Prometheus remote-write
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

  # Also expose a /metrics scrape endpoint (Prometheus can also pull from here)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otelcol"

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki, debug]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

services:
  # --------------------------------------------------------------------------
  # OpenTelemetry Collector
  # Receives traces/metrics/logs from the application and fans out to backends.
  # --------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: awcp-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver  (application → collector)
      - "4318:4318"   # OTLP HTTP receiver  (application → collector)
      - "8889:8889"   # Prometheus scrape endpoint (collector → prometheus)
      - "13133:13133" # Health check
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - observability

  # --------------------------------------------------------------------------
  # Grafana Tempo — distributed tracing backend
  # --------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.5.0
    container_name: awcp-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query API (Grafana data source)
      - "4317"        # Internal gRPC OTLP receiver from collector (not exposed)
    networks:
      - observability

  # --------------------------------------------------------------------------
  # Grafana Loki — log aggregation backend
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: awcp-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP API (Grafana data source + collector push)
    networks:
      - observability

  # --------------------------------------------------------------------------
  # Prometheus — metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: awcp-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"   # accept remote-write from collector
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # Prometheus UI + API (Grafana data source)
    networks:
      - observability

  # --------------------------------------------------------------------------
  # Grafana — unified observability UI
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: awcp-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # Grafana UI
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability

# ------------------------------------------------------------------------------
# Persistent volumes (data survives container restarts)
# ------------------------------------------------------------------------------
volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

# ------------------------------------------------------------------------------
# Isolated network so containers resolve each other by service name
# ------------------------------------------------------------------------------
networks:
  observability:
    driver: bridge

# =============================================================================
# Prometheus — metrics collection configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: awcp

# ---------------------------------------------------------------------------
# Scrape configs
# ---------------------------------------------------------------------------
scrape_configs:
  # OTel Collector self-telemetry (collector metrics + all app metrics
  # exposed on the collector's :8889 prometheus endpoint).
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # OTel Collector internal metrics (pipeline throughput, errors, etc.)
  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Prometheus self-scrape.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

# =============================================================================
# Grafana Loki — log aggregation backend configuration
# Single-binary (monolithic) mode for development.
# Compatible with Loki 3.0+
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema configuration — v13 uses TSDB for better query performance.
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Query range tuning.
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Limits — generous defaults for dev workloads.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 500
  max_query_lookback: 720h

# NOTE: retention_enabled is intentionally removed.
# In Loki 3.x, enabling retention requires 'delete-request-store' to also be
# configured. For dev, we rely on Docker volume pruning instead.
compactor:
  working_directory: /loki/compactor

analytics:
  reporting_enabled: false
